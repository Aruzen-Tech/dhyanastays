name: ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dhyana_stays
          POSTGRES_USER: dhyana
          POSTGRES_PASSWORD: dhyana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dhyana:dhyana@localhost:5432/dhyana_stays?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
        with:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dhyana/api prisma:generate
      - run: pnpm --filter @dhyana/api test
      - run: pnpm --filter @dhyana/api build
