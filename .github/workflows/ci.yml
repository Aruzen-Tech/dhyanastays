name: ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dhyana/api lint

  # ── Type-check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dhyana/api prisma:generate
      - name: Type-check API
        run: pnpm --filter @dhyana/api exec tsc --noEmit
      - name: Type-check Web
        run: pnpm --filter @dhyana/web exec tsc --noEmit

  # ── API tests ───────────────────────────────────────────────────────────────
  api:
    name: API tests + build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dhyana_stays
          POSTGRES_USER: dhyana
          POSTGRES_PASSWORD: dhyana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dhyana:dhyana@localhost:5432/dhyana_stays?schema=public
      DIRECT_URL: postgresql://dhyana:dhyana@localhost:5432/dhyana_stays?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-min-16-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-min-16-chars
      PRICE_SNAPSHOT_SECRET: ci-snapshot-secret-must-be-32-characters!
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dhyana/api prisma:generate
      - run: pnpm --filter @dhyana/api test
      - run: pnpm --filter @dhyana/api build

  # ── Web build ───────────────────────────────────────────────────────────────
  web:
    name: Web build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dhyana/web build

  # ── Docker build (main only) ─────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Verify API Docker build
        run: docker build -f apps/api/Dockerfile -t dhyana-api:ci .
      - name: Verify Web Docker build
        run: docker build -f apps/web/Dockerfile -t dhyana-web:ci .
