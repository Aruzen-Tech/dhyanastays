version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dhyana_stays
      POSTGRES_USER: dhyana
      POSTGRES_PASSWORD: dhyana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.0
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: meili_dev_key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  meili_data: